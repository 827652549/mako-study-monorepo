<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>练习1：原生 EventSource</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #1a1a1a; color: #e0e0e0; }
    h2 { color: #7ec8e3; }
    .card { background: #2a2a2a; border-radius: 8px; padding: 16px; margin: 12px 0; }
    .label { color: #888; font-size: 12px; margin-bottom: 6px; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
    .event { padding: 4px 8px; margin: 2px 0; border-radius: 4px; font-size: 13px; }
    .event-begin  { background: #1a3a1a; color: #7ec87e; }
    .event-text   { background: #1a2a3a; color: #7ec8e3; }
    .event-type   { background: #3a2a1a; color: #e3c87e; }
    .event-end    { background: #3a1a1a; color: #e37e7e; }
    button { background: #7ec8e3; color: #1a1a1a; border: none; padding: 8px 20px;
             border-radius: 6px; cursor: pointer; font-weight: bold; margin-right: 8px; }
    button:hover { opacity: 0.85; }
    .tip { color: #888; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>

<h2>练习 1 · 原生 EventSource</h2>

<div class="card">
  <div class="label">知识点</div>
  <pre>
原生 EventSource 的局限：
  ✅ 建立长连接，服务端主动推送
  ✅ 自动重连（reconnect）
  ❌ 只支持 GET，无法发送 body
  ❌ 无法自定义 Header（如 Authorization）

→ 这就是为什么项目里用 fetch + ReadableStream 替代原生 EventSource
  </pre>
</div>

<div class="card">
  <div class="label">操作</div>
  <button id="btnConnect">连接 SSE</button>
  <button id="btnClose">断开</button>
  <span class="tip">需先启动 server.js：node server.js</span>
</div>

<div class="card">
  <div class="label">收到的事件流</div>
  <div id="output"></div>
</div>

<div class="card">
  <div class="label">核心代码（阅读理解）</div>
  <pre id="code"></pre>
</div>

<script>
// ─────────────────────────────────────────────
// 核心代码展示
// ─────────────────────────────────────────────
const codeStr = `
// 1. 建立连接 —— 只需传 URL，浏览器自动发 GET 请求
const es = new EventSource('http://localhost:3099/sse/stream');

// 2. 监听具名事件（event: message_begin）
es.addEventListener('message_begin', (e) => {
  const data = JSON.parse(e.data);
  console.log('会话开始', data.chatId);
});

// 3. 监听流式文本
es.addEventListener('message_text', (e) => {
  const { text } = JSON.parse(e.data);
  document.getElementById('output').innerText += text;
});

// 4. 监听结束事件
es.addEventListener('message_end', (e) => {
  const { success } = JSON.parse(e.data);
  if (success === 'true') es.close(); // 主动关闭
});

// 5. 错误处理 & 自动重连
es.onerror = (err) => {
  // readyState: 0=CONNECTING, 1=OPEN, 2=CLOSED
  if (es.readyState === EventSource.CLOSED) {
    console.log('连接已关闭');
  }
};
`.trim();

document.getElementById('code').textContent = codeStr;

// ─────────────────────────────────────────────
// 实际运行
// ─────────────────────────────────────────────
let es = null;
const output = document.getElementById('output');

document.getElementById('btnConnect').addEventListener('click', () => {
  if (es) { es.close(); }
  output.innerHTML = '';

  // ★ 核心：建立 EventSource 连接
  es = new EventSource('http://localhost:3099/sse/stream');

  es.addEventListener('message_begin', (e) => {
    const data = JSON.parse(e.data);
    appendEvent('message_begin', `chatId=${data.chatId}  messageId=${data.messageId}`);
  });

  es.addEventListener('message_text', (e) => {
    const { text } = JSON.parse(e.data);
    appendEvent('message_text', `"${text}"`);
  });

  es.addEventListener('message_type', (e) => {
    const data = JSON.parse(e.data);
    appendEvent('message_type', `messageType=${data.messageType}`);
  });

  es.addEventListener('message_end', (e) => {
    const data = JSON.parse(e.data);
    appendEvent('message_end', `success=${data.success}`);
    es.close(); // 流结束后主动关闭
  });

  es.onerror = () => {
    appendEvent('error', `readyState=${es.readyState}`);
  };
});

document.getElementById('btnClose').addEventListener('click', () => {
  if (es) { es.close(); es = null; }
  appendEvent('closed', '手动断开');
});

function appendEvent(type, content) {
  const div = document.createElement('div');
  div.className = `event event-${type.split('_')[1] || type}`;
  div.textContent = `[${type}]  ${content}`;
  output.appendChild(div);
}
</script>
</body>
</html>
